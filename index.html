<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfume Store</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="text-[#3A3A3A] font-sans bg-blue-400 sm:bg-teal-300 md:bg-[#FDF6EC]">

  <!-- Navigation & Header -->
  <header class="bg-blue-800 text-white py-16 text-center sm:bg-[#000000] md:bg-[#34495E]">
    <nav class="bg-[#2C3E50] p-3">
      <ul class="flex justify-start sm:justify-end md:justify-center space-x-8">
        <li><a href="#home" class="text-white font-bold hover:text-sky-300">Home</a></li>
        <li><a href="#products" class="text-white font-bold hover:text-sky-300">Products</a></li>
        <li><a href="#about" class="text-white font-bold hover:text-sky-300">About</a></li>
        <li><a href="#contact" class="text-white font-bold hover:text-sky-300">Contact</a></li>
      </ul>
    </nav>
    <br>
    <h1 class="text-5xl font-bold mt-4">Luxury Fragrances</h1>
    <br>
    <p class="text-lg mt-2">Discover your signature fragrance</p>
  </header>

  <!-- Hero Section -->
  <section id="home" class="text-center"><br><br><br>
    <h2 class="text-3xl font-semibold text-center">" Welcome To Fragrance World "</h2>
    <br>
    <img class="max-w-4xl mx-auto rounded-lg mt-8" src="/Images/main.webp" alt="Perfume Bottle" />
  </section>

  <!-- Products Section using iframe -->
  <section id="products" class="py-10">
    <iframe src="products.html" class="w-full min-h-[1600px] md:min-h-[1210px] border-0 overflow-hidden"
      id="productFrame" scrolling="no">
    </iframe>
  </section>


  <!-- About Section using iframe -->
  <section id="about">
    <iframe src="about.html" class="about w-full bg-[#F8E8D4] border-0 p-10"></iframe>
  </section>

  <!-- Contact Section using iframe -->
  <section id="contact">
    <iframe src="contact.html"
    scrolling="no" 
    class="w-full h-[686px] border-0 block"></iframe>
  </section>

  <!-- Footer -->
  <footer class="bg-black text-white text-center py-2 text-xs font-bold">
    <p>© 2026 Luxury Scents Pvt Ltd. support@luxuryscents.pk</p>
  </footer>

  <!-- External JavaScript -->
  <script src="main.js">
    window.addEventListener('message', function(e) {
    const frame = document.getElementById('productFrame');
    if (e.data.height) {
        frame.style.height = e.data.height + 'px';
    }
}, false);
  </script>
</body>

</html>
